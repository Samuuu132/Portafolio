version: '3.8'

services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
